# Configure specific class log levels
log4j.logger.com.practice.logdemo.slf4j.Log4jPropertiesConfig=DEBUG

# Disable logging for specific packages (if needed)
log4j.logger.org.springframework=WARN
log4j.logger.org.hibernate=WARN
log4j.logger.org.apache.commons=WARN

# Additivity control - prevent log messages from being sent to parent appenders
log4j.additivity.com.practice.logdemo.slf4j=false
