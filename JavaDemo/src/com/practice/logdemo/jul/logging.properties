# Java Util Logging Configuration File

# Global logging level
.level=INFO

# Console Handler Configuration
handlers=java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# Console Handler Settings
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=com.practice.logdemo.jul.GlobalCustomFormatter

java.util.logging.ConsoleHandler.encoding=UTF-8

# File Handler Settings
java.util.logging.FileHandler.level=ALL
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.FileHandler.pattern=jul_config_%g.log
java.util.logging.FileHandler.limit=1028
java.util.logging.FileHandler.count=5
java.util.logging.FileHandler.append=true
java.util.logging.FileHandler.encoding=UTF-8

# Specific Logger Settings
com.practice.logdemo.level=ALL
com.practice.logdemo.handlers=java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# Formatter Settings
java.util.logging.SimpleFormatter.format=[%1$tF %1$tT] [%2$-7s] %3$-20s: %4$s %n
